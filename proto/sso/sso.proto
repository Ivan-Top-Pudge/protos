syntax = "proto3";

package auth;

option go_package = "vano.sso.v1;ssov1";

service Auth {
    rpc Register (RegisterRequest) returns (RegisterResponce);
    rpc Login (LoginRequest) returns (LoginResponse);
    // IsAdmin checks whether a user is an admin.
    rpc IsAdmin (IsAdminRequest) returns (IsAdminResponse);
    // IsUserExists checks whether a user exists
    rpc IsUserExists(IsUserExistsRequest) returns (IsUserExistsResponse);
}

message RegisterRequest {
    string email = 1;
    string password = 2;
}

message RegisterResponce{
    int64 user_id = 1;
}

message LoginRequest {
    string email = 1;
    string password = 2;
    int32 app_id = 3;
}

message LoginResponse {
    string token = 1;
}

message IsAdminRequest {
    int64 user_id = 1;
}

message IsAdminResponse {
    bool is_admin = 1;
}

message IsUserExistsRequest {
    int64 user_id = 1;
}

message IsUserExistsResponse {
    bool exists = 1;
}